<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Posts App</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="navbar">
        <h1 id="app-title">Scrollr<sup class="registered">®</sup></h1>
        <div class="navbar-buttons">
          <button id="feed">Feed</button>
          <button id="favorites">Favorites</button>
        </div>
      </div>
      <div class="feed-section">
        <h2>Feed</h2>
        <div id="posts-container"></div>
        <div id="post-view-background" class="hidden">
          <div id="post-view"></div>
        </div>
      </div>
      <div class="favorites-section">
        <h2>Favorites</h2>
        <div id="favorites-container"></div>
        <div class="modal-background hidden">
          <div id="unfavorite-modal" class="modal">
            <div class="modal-header">
              <svg id="modal-close" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" class="size-6">
                <path fill-rule="evenodd" d="M5.47 5.47a.75.75 0 0 1 1.06 0L12 10.94l5.47-5.47a.75.75 0 1 1 1.06 1.06L13.06 12l5.47 5.47a.75.75 0 1 1-1.06 1.06L12 13.06l-5.47 5.47a.75.75 0 0 1-1.06-1.06L10.94 12 5.47 6.53a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd" />
              </svg>
            </div>
            <div class="modal-content">
              <p>Are you sure you want to remove this post from your favorites?</p>
            </div>
            <div class="modal-footer">
              <button id="modal-confirm">Remove</button>
              <button id="modal-cancel">Cancel</button>
            </div>
          </div>
        </div>
      </div>
      <div class="search-container">
        <div class="search-input-wrapper search-closed">
          <input type="search" id="search-input" placeholder="Search posts..." />
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" class="size-6 clear-search">
            <path fill-rule="evenodd" d="M5.47 5.47a.75.75 0 0 1 1.06 0L12 10.94l5.47-5.47a.75.75 0 1 1 1.06 1.06L13.06 12l5.47 5.47a.75.75 0 1 1-1.06 1.06L12 13.06l-5.47 5.47a.75.75 0 0 1-1.06-1.06L10.94 12 5.47 6.53a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd" />
          </svg>
        </div>
        <svg id='search-icon' xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6">
          <path d="M8.25 10.875a2.625 2.625 0 1 1 5.25 0 2.625 2.625 0 0 1-5.25 0Z" />
          <path fill-rule="evenodd" d="M12 2.25c-5.385 0-9.75 4.365-9.75 9.75s4.365 9.75 9.75 9.75 9.75-4.365 9.75-9.75S17.385 2.25 12 2.25Zm-1.125 4.5a4.125 4.125 0 1 0 2.338 7.524l2.007 2.006a.75.75 0 1 0 1.06-1.06l-2.006-2.007a4.125 4.125 0 0 0-3.399-6.463Z" clip-rule="evenodd" />
        </svg>
      </div>
    </div>
    <script type="module" src="script.js"></script>
  </body>
</html>
